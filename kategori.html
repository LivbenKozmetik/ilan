<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kategoriler — İlanSite</title>
  <meta name="description" content="Kategoriye göre ilanları keşfedin. Filtreleme, arama ve sonsuz kaydırma destekli." />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="font-sans antialiased bg-gray-50 text-gray-900">
  <header class="bg-white shadow sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
      <a href="index.html" class="flex items-center gap-3"><svg class="w-8 h-8 text-green-600" viewBox="0 0 24 24" fill="none"><path d="M3 12l4-4 4 4 8-8 2 2-10 10L7 12l-4 4-2-2z" fill="currentColor"/></svg><span class="text-lg font-semibold">İlanSite</span></a>
      <div class="flex items-center gap-3">
        <select id="langSelect" class="p-2 border rounded-md bg-white text-sm" aria-label="Dil seçimi"></select>
        <a href="ilan-ekle.html" class="px-3 py-2 bg-green-600 text-white rounded-md">İlan Oluştur</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <nav class="text-sm text-gray-500 mb-4" aria-label="Breadcrumb">
      <a href="index.html" class="hover:underline">Ana Sayfa</a><span class="mx-2">/</span><span id="breadcrumbCurrent">Kategoriler</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      <aside class="lg:col-span-1">
        <div class="bg-white p-4 rounded-lg shadow-sm sticky top-20">
          <h2 class="text-lg font-semibold mb-3" data-i18n="filters.title">Filtreler</h2>
          <label class="block text-sm text-gray-700 mb-2">Kategori</label>
          <select id="categorySelect" class="w-full p-2 border rounded-md mb-3"><option value="">Tüm Kategoriler</option></select>

          <label class="block text-sm text-gray-700 mb-2">Konum</label>
          <input id="locationFilter" type="text" placeholder="Şehir veya ilçe" class="w-full p-2 border rounded-md mb-3" />

          <label class="block text-sm text-gray-700 mb-2">Fiyat aralığı</label>
          <div class="flex gap-2 mb-3"><input id="priceMin" type="number" placeholder="Min" class="w-1/2 p-2 border rounded-md" /><input id="priceMax" type="number" placeholder="Max" class="w-1/2 p-2 border rounded-md" /></div>

          <div class="flex gap-2"><button id="applyFilters" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-md">Uygula</button><button id="clearFilters" class="px-4 py-2 bg-gray-100 rounded-md">Temizle</button></div>
        </div>
      </aside>

      <section class="lg:col-span-3">
        <header class="flex items-center justify-between mb-4">
          <h1 id="categoryTitle" class="text-2xl font-semibold">Tüm İlanlar</h1>
          <div class="text-sm text-gray-500"><span id="resultCount">0</span> sonuç</div>
        </header>

        <div class="mb-4 flex gap-3">
          <input id="searchInput" type="search" placeholder="Ara: başlık, açıklama, konum..." class="flex-1 p-2 border rounded-md" />
          <select id="sortSelect" class="p-2 border rounded-md"><option value="relevance">Öne çıkan</option><option value="newest">En yeni</option><option value="price_desc">Fiyat: Yüksek → Düşük</option><option value="price_asc">Fiyat: Düşük → Yüksek</option></select>
        </div>

        <div id="listingsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" aria-live="polite"></div>

        <div id="loadingIndicator" class="mt-6 flex items-center justify-center hidden"><svg class="animate-spin h-8 w-8 text-green-600" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.15" stroke-width="4"/><path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg><span class="ml-3 text-sm text-gray-600">Yükleniyor...</span></div>

        <div id="endOfList" class="mt-8 text-center text-gray-500 hidden">Daha fazla ilan yok.</div>
        <div id="sentinel" class="h-1"></div>
      </section>
    </div>
  </main>

  <script src="scripts.js" defer></script>
  <script src="app.js" defer></script>
  <script src="public/seed-listings.js" defer></script>
</body>
</html>
