<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>İlanSite — İş Makineleri & Ekipman İlanları</title>
  <meta name="description" content="Satılık ve kiralık iş makineleri, ekipmanlar ve yedek parçalar. Hızlı arama, güvenli ilan yönetimi." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon-32.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen bg-gray-50 text-gray-800 font-sans antialiased">
  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
      <a href="index.html" class="flex items-center gap-3 focus:outline-none focus:ring-2 focus:ring-green-200 rounded" aria-label="İlanSite ana sayfa">
        <svg class="w-9 h-9 text-green-600" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12l4-4 4 4 8-8 2 2-10 10L7 12l-4 4-2-2z" fill="currentColor"/></svg>
        <span class="text-xl font-semibold tracking-tight">İlanSite</span>
      </a>

      <div class="flex items-center gap-4 flex-1 max-w-3xl">
        <div class="relative w-full">
          <input id="searchInputHeader" type="search" placeholder="Ara: forklift, ekskavatör..." class="w-full p-3 pl-10 border rounded-lg focus:ring-2 focus:ring-green-200" aria-label="site içi arama" data-i18n="search.placeholder" />
          <svg class="w-5 h-5 absolute left-3 top-3 text-gray-400" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <select id="langSelect" class="p-2 border rounded-md text-sm bg-white" aria-label="Dil seçimi"></select>
        <a href="ilan-ekle.html" class="text-sm px-3 py-1 bg-green-600 text-white rounded shadow-sm hover:bg-green-700 transition" data-i18n="nav.create">İlan Oluştur</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10">
    <section class="mb-12">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-2xl font-semibold" data-i18n="listings.title">Güncel İlanlar</h2>
        <div class="text-sm text-gray-500">Güncellendi: <span id="listUpdated">—</span></div>
      </div>

      <div id="listingsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" aria-live="polite"></div>

      <div id="loadingIndicator" class="mt-6 flex items-center justify-center hidden" aria-hidden="true">
        <svg class="animate-spin h-8 w-8 text-green-600" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-opacity="0.15" stroke-width="4"/><path d="M22 12a10 10 0 00-10-10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>
        <span class="ml-3 text-sm text-gray-600">Yükleniyor...</span>
      </div>

      <div id="endOfList" class="mt-8 text-center text-gray-500 hidden">Daha fazla ilan yok.</div>
      <div id="scrollSentinel" class="h-1"></div>
    </section>
  </main>

  <footer class="border-t bg-white">
    <div class="max-w-7xl mx-auto px-6 py-6 text-sm text-gray-600 flex justify-between">
      <div>© <span id="yearFooter"></span> İlanSite — Tüm hakları saklıdır.</div>
      <div class="flex gap-4">
        <a href="kategori.html" class="hover:text-gray-900">Kategoriler</a>
        <a href="#" class="hover:text-gray-900">Gizlilik</a>
      </div>
    </div>
  </footer>

  <!-- Listing template: zengin içerik (tags, location, rating, date, actions) -->
  <template id="listingTpl">
    <article class="bg-white rounded-lg shadow-md overflow-hidden group h-full" tabindex="0" role="article" aria-label="ilan kartı">
      <div class="relative h-48 bg-gray-100 overflow-hidden">
        <img class="object-cover w-full h-full transition-transform duration-300 group-hover:scale-105" loading="lazy" alt="ilan resim" />
        <div class="absolute left-3 top-3">
          <span class="badge-primary text-xs">Öne Çıkan</span>
        </div>
        <div class="absolute right-3 top-3 flex items-center gap-2">
          <button class="favorite-btn bg-white/80 rounded-full p-2 shadow" aria-label="Favori ekle" title="Favori ekle">
            <svg class="w-4 h-4 text-gray-700" viewBox="0 0 24 24" fill="none"><path d="M12 21l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 6 4 4 6.5 4 8 4 9.5 5 10 6.5 10.5 5 12 4 13.5 4 16 4 18 6 18 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="p-4 flex flex-col h-full">
        <h3 class="text-md font-semibold leading-tight"></h3>
        <div class="mt-2 flex items-center gap-2 text-xs text-gray-500">
          <span class="location-badge"></span>
          <time class="text-gray-400 text-xs post-date" datetime=""></time>
        </div>
        <p class="text-sm text-gray-600 mt-2 line-clamp-3"></p>
        <div class="mt-3 flex flex-wrap gap-2 tags-wrap"></div>
        <div class="mt-auto flex items-center justify-between gap-3">
          <div class="text-md font-bold text-green-600 price"></div>
          <div class="flex items-center gap-2">
            <a class="text-sm text-blue-600 font-medium detail-link" href="#">Detay</a>
            <button class="text-sm text-gray-500 share-btn" aria-label="Paylaş">Paylaş</button>
            <button class="text-sm contact-btn text-white bg-indigo-600 px-3 py-1 rounded" aria-label="İlan sahibine mesaj">İletişim</button>
          </div>
        </div>
      </div>
    </article>
  </template>

  <!-- Contact Modal -->
  <div id="modalBackdrop" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50" aria-hidden="true">
    <div id="contactModal" role="dialog" aria-modal="true" aria-labelledby="contactModalTitle" class="bg-white rounded-lg shadow-lg max-w-lg w-full p-6">
      <h3 id="contactModalTitle" class="text-lg font-semibold mb-2">İlan Sahibiyle İletişime Geç</h3>
      <p id="contactModalDesc" class="text-sm text-gray-600 mb-4">Mesaj gönderin; iletişim bilgileri doğrudan paylaşılmaz.</p>
      <form id="contactForm" class="space-y-3">
        <input id="contactName" type="text" placeholder="Adınız" class="w-full p-2 border rounded" required />
        <input id="contactEmail" type="email" placeholder="E-posta" class="w-full p-2 border rounded" required />
        <textarea id="contactMessage" rows="4" placeholder="Mesajınız..." class="w-full p-2 border rounded" required></textarea>
        <div class="flex justify-end gap-2">
          <button type="button" id="modalCancel" class="px-4 py-2 bg-gray-100 rounded">İptal</button>
          <button type="submit" id="modalSend" class="px-4 py-2 bg-indigo-600 text-white rounded">Gönder</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastWrap" class="fixed right-4 bottom-6 z-50 space-y-2"></div>

  <script src="app.js" defer></script>
  <script src="scripts.js" defer></script>
  <script>document.getElementById('yearFooter').textContent = new Date().getFullYear(); document.getElementById('listUpdated').textContent = new Date().toLocaleString();</script>
</body>
</html>
