version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ilan_db
      POSTGRES_USER: ilan_user
      POSTGRES_PASSWORD: ilan_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ilan_user -d ilan_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://ilan_user:ilan_password@postgres:5432/ilan_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./admin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: