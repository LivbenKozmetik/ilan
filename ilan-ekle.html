<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>İlan Oluştur — İlanSite</title>
  <meta name="description" content="Yeni ilan oluşturun. Fotoğraf ekleyin, canlı önizleme yapın ve ilanı indirin." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased bg-gray-50 text-gray-900">
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3"><svg class="w-8 h-8 text-green-600" viewBox="0 0 24 24" fill="none"><path d="M3 12l4-4 4 4 8-8 2 2-10 10L7 12l-4 4-2-2z" fill="currentColor"/></svg><span class="text-lg font-semibold">İlanSite</span></a>
      <select id="langSelect" class="p-2 border rounded-md bg-white text-sm" aria-label="Dil seçimi"></select>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-3 gap-6">
    <section class="lg:col-span-2 bg-white p-8 rounded-lg shadow-sm">
      <h2 class="text-2xl font-semibold mb-4">İlan Oluştur</h2>

      <form id="ilanForm" class="space-y-4" autocomplete="off" novalidate>
        <div>
          <label for="title" class="block text-sm font-medium">Başlık</label>
          <input id="title" name="title" type="text" class="w-full p-3 border rounded-md" placeholder="Ör: Satılık Forklift - 2018" required />
        </div>

        <div>
          <label for="description" class="block text-sm font-medium">Açıklama</label>
          <textarea id="description" name="description" rows="6" class="w-full p-3 border rounded-md" placeholder="Detaylı açıklama..." required></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="price" class="block text-sm font-medium">Fiyat (₺)</label>
            <input id="price" name="price" type="number" class="w-full p-2 border rounded-md" required />
          </div>
          <div>
            <label for="category" class="block text-sm font-medium">Kategori</label>
            <input id="category" name="category" type="text" class="w-full p-2 border rounded-md" required />
          </div>
        </div>

        <div>
          <label for="location" class="block text-sm font-medium">Konum</label>
          <input id="location" name="location" type="text" class="w-full p-2 border rounded-md" required />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Resimler</label>
          <div id="dropzone" class="p-3 border rounded-md bg-gray-50">
            <div class="flex gap-2 items-center">
              <input id="fileInput" name="images" type="file" accept="image/*" multiple class="text-sm" />
              <input id="urlInput" type="text" placeholder="Resim URL'si yapıştırıp Enter" class="flex-1 p-2 border rounded-md" />
              <button id="clearImgs" type="button" class="ml-2 px-3 py-1 bg-red-100 text-red-700 rounded-md text-sm">Temizle</button>
            </div>
            <div id="thumbs" class="flex gap-2 mt-3 overflow-x-auto"></div>
          </div>
        </div>

        <div class="flex gap-3">
          <button id="openPreview" type="button" class="px-4 py-2 bg-blue-600 text-white rounded-md">Ön İzleme</button>
          <button id="downloadHtml" type="button" class="px-4 py-2 bg-indigo-600 text-white rounded-md">İlanı HTML İndir</button>
          <button type="submit" class="ml-auto px-4 py-2 bg-green-600 text-white rounded-md">Kaydet</button>
        </div>
      </form>
    </section>

    <aside class="bg-white p-6 rounded-lg shadow-sm">
      <h3 class="text-lg font-medium mb-3">Canlı Ön İzleme</h3>
      <div id="previewRegion" aria-live="polite">
        <article id="previewCard" class="bg-white rounded-lg shadow border overflow-hidden">
          <div id="previewImageWrap" class="w-full h-48 bg-gray-100 flex items-center justify-center overflow-hidden">
            <img id="previewImage" src="https://via.placeholder.com/640x360?text=İlan+Resmi" alt="İlan resmi" class="object-contain w-full h-full" />
          </div>
          <div class="p-4">
            <h3 id="previewTitle" class="text-lg font-semibold">Başlık girilmedi</h3>
            <p id="previewDescription" class="text-sm text-gray-700 mt-2">Açıklama girilmedi</p>
            <div class="mt-3 text-green-600 font-bold" id="previewPrice">Fiyat yok</div>
          </div>
        </article>
      </div>
    </aside>
  </main>

  <div id="toastWrap" class="fixed right-4 bottom-6 z-50 space-y-2"></div>

  <script src="scripts.js" defer></script>
</body>
</html>
